# openapi.yaml
swagger: '2.0'
info:
  title: Flask API Gateway
  description: API Gateway for the Flask Cloud Run service
  version: 1.0.0
schemes:
  - https
produces:
  - application/json
paths:
  /:
    get:
      summary: Hello World Endpoint
      operationId: helloWorld
      x-google-backend:
        address: https://flask-app-tezynawuda-uc.a.run.app
        protocol: h2
      responses:
        '200':
          description: A successful response
  /messages:
    get:
      summary: Get Messages
      operationId: getMessages
      x-google-backend:
        address: https://flask-app-tezynawuda-uc.a.run.app/messages
        protocol: h2
      responses:
        '200':
          description: A list of messages
    post:
      summary: Add a Message
      operationId: addMessage
      x-google-backend:
        address: https://flask-app-tezynawuda-uc.a.run.app/messages
        protocol: h2
      consumes:
        - application/json
      parameters:
        - in: body
          name: body
          description: Message object
          required: true
          schema:
            type: object
            properties:
              message:
                type: string
      responses:
        '201':
          description: Message added successfully
